<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4T577GC8SB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-4T577GC8SB');
  </script>
  <title>Seed thresholds explorer</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
      color: #444;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      width: 100%;
      margin-top: 8px;
    }

    .checkbox-group label {
      flex-direction: row;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    input[type=number],
    select {
      padding: 6px 8px;
      font-size: 14px;
      min-width: 140px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    #factor-tables {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 16px;
      align-items: start;
    }

    #table-container {
      position: relative;
      overflow: visible;
    }

    table {
      border-collapse: collapse;
      margin: 18px 0;
      width: 100%;
      table-layout: fixed;
    }

    #factor-tables table {
      width: 100%;
      white-space: normal;
    }

    .grid-table {
      width: max-content;
      white-space: nowrap;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
    }

    caption {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .grid-caption {
      font-weight: 600;
      margin-bottom: 6px;
      text-align: center;
    }

    .grid-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .missing {
      background: #f9f9f9;
      color: #888;
    }

    #status {
      margin: 8px 0 0 0;
      color: #555;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 1.25rem;
      }

      form {
        gap: 12px;
      }

      .primary-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
        width: 100%;
      }

      label {
        width: 100%;
      }

      /* Allow range and threshold to sit side-by-side if space permits */
      .primary-controls label {
        flex: 1 1 140px;
      }

      input[type=number],
      select {
        width: 100%;
        min-width: 0;
      }

      button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin-top: 8px;
      }

      .checkbox-group {
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        gap: 8px;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
        /* Force new row on desktop */
      }

      .checkbox-group label {
        white-space: nowrap;
      }

      #factor-tables {
        grid-template-columns: 1fr;
      }

      .secondary-controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 8px;
      }
    }

    /* Desktop styles for new structure */
    .primary-controls {
      display: contents;
    }

    .secondary-controls {
      display: contents;
    }
  </style>
</head>

<body>
  <h1>Advancement odds by awards, playoffs, alliance seed, and qual rank</h1>
  <form id="controls">
    <div class="primary-controls">
      <label>Team range
        <select id="teamRange">
          <option value="0-10">(0-10)</option>
          <option value="11-20">(11-20)</option>
          <option value="21-30" selected>(21-30)</option>
          <option value="31-40">(31-40)</option>
          <option value="40+">40+</option>
          <option value="custom">Custom</option>
        </select>
      </label>
      <label id="minTeamsLabel" style="display:none">Min teams
        <input type="number" id="minTeams" value="21" min="0" />
      </label>
      <label id="maxTeamsLabel" style="display:none">Max teams
        <input type="number" id="maxTeams" value="30" min="0" />
      </label>
      <label>Adv rank threshold (≤)
        <input type="number" id="threshold" value="6" min="1" />
      </label>
      <button type="submit">Update</button>
    </div>
    <div class="secondary-controls">
      <label>2-way table: columns (X axis)
        <select id="axisX"></select>
      </label>
      <label>2-way table: rows (Y axis)
        <select id="axisY"></select>
      </label>
      <div class="checkbox-group" id="tableToggles"></div>
    </div>
  </form>
  <div id="status"></div>
  <div id="warning-container"></div>
  <div id="factor-tables"></div>
  <div id="table-container"></div>

  <script>
    const controls = document.getElementById('controls');
    const rangeSelect = document.getElementById('teamRange');
    const minInput = document.getElementById('minTeams');
    const maxInput = document.getElementById('maxTeams');
    const thresholdInput = document.getElementById('threshold');
    const axisXSelect = document.getElementById('axisX');
    const axisYSelect = document.getElementById('axisY');
    const tableToggles = document.getElementById('tableToggles');
    const statusEl = document.getElementById('status');
    const factorTables = document.getElementById('factor-tables');
    const tableContainer = document.getElementById('table-container');
    let DATA = [];
    let selectedTables = new Set();

    const RANGE_PRESETS = {
      '0-10': { min: 0, max: 10 },
      '11-20': { min: 11, max: 20 },
      '21-30': { min: 21, max: 30 },
      '31-40': { min: 31, max: 40 },
      '40+': { min: 40, max: 999 },
    };

    const hslToRgb = (h, s, l) => {
      // Convert HSL (0-360, 0-100, 0-100) to RGB 0-255 for contrast checks
      s /= 100;
      l /= 100;
      const k = (n) => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = (n) => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
      return [Math.round(255 * f(0)), Math.round(255 * f(8)), Math.round(255 * f(4))];
    };

    const colorForPct = (pct) => {
      const capped = Math.max(0, Math.min(100, pct));
      const hue = capped * 1.2; // 0% = red (0deg), 100% = green (120deg)
      const saturation = 85;
      const lightness = 55;
      const [R, G, B] = hslToRgb(hue, saturation, lightness);
      const brightness = (R * 299 + G * 587 + B * 114) / 1000;
      const text = brightness > 140 ? '#000' : '#fff';
      return { bg: `hsl(${hue}, ${saturation}%, ${lightness}%)`, fg: text };
    };

    const PLAYOFF_LABELS = {
      40: { label: '1st playoffs (40)', sort: 1 },
      20: { label: '2nd playoffs (20)', sort: 2 },
      10: { label: '3rd playoffs (10)', sort: 3 },
      5: { label: '4th playoffs (5)', sort: 4 },
      0: { label: 'Not top 4 (0)', sort: 5 },
    };

    const AWARD_LABELS = {
      60: { label: 'Inspire 1st (60)', sort: 1 },
      30: { label: 'Inspire 2nd (30)', sort: 2 },
      15: { label: 'Inspire 3rd (15)', sort: 3 },
      12: { label: '1st place award (12)', sort: 4 },
      6: { label: '2nd place award (6)', sort: 5 },
      3: { label: '3rd place award (3)', sort: 6 },
      0: { label: 'No awards (0)', sort: 7 },
    };

    const FACTORS = [
      {
        id: 'award',
        label: 'Awards',
        get: (r) => r.award_points,
        normalize: (val) => {
          if (val == null || val === '') return null;
          const base = AWARD_LABELS[val];
          return {
            key: String(val),
            label: base ? base.label : `${val} award pts`,
            sort: base ? base.sort : 1000 + (100 - val),
          };
        },
      },
      {
        id: 'playoff',
        label: 'Playoffs',
        fullLabel: 'Playoffs placing',
        get: (r) => r.playoff_points,
        normalize: (val) => {
          if (val == null || val === '') return null;
          const base = PLAYOFF_LABELS[val];
          return {
            key: String(val),
            label: base ? base.label : `${val} playoff pts`,
            sort: base ? base.sort : 1000 + (100 - val),
          };
        },
      },
      {
        id: 'alliance',
        label: 'Alliances',
        fullLabel: 'Alliance seed',
        get: (r) => r.alliance_selection_points,
        normalize: (val) => {
          if (val == null || val === '') return null;
          if (val === 0) {
            return { key: '0', label: 'Not selected (0 pts)', sort: 999 };
          }
          const seed = Number.isFinite(val) ? 21 - val : null;
          const seedLabel = Number.isFinite(seed) ? `Seed ${seed}` : `${val} pts`;
          return {
            key: String(val),
            label: `${seedLabel} (${val} pts)`,
            sort: Number.isFinite(seed) ? seed : 1000 + (100 - val),
          };
        },
      },
      {
        id: 'qual',
        label: 'Quals',
        fullLabel: 'Qual rank',
        get: (r) => r.qual_rank,
        normalize: (val) => {
          if (val == null || val === '') return null;
          const num = Number(val);
          if (!Number.isFinite(num)) return null;
          if (num <= 15) return { key: String(num), label: `#${num}`, sort: num };
          // Bucket everything above 15 in groups of 5 (16-20, 21-25, 26-30, ...)
          const bucketStart = Math.floor((num - 1) / 5) * 5 + 1;
          const bucketEnd = bucketStart + 4;
          const key = `${bucketStart}-${bucketEnd}`;
          return { key, label: `#${key}`, sort: bucketStart };
        },
      },
    ];

    const FACTOR_LOOKUP = Object.fromEntries(FACTORS.map((f) => [f.id, f]));
    const getSelectedTableKeys = () => new Set(Array.from(tableToggles?.querySelectorAll('input[type=checkbox]:checked') ?? []).map((i) => i.value));

    function parseCsvLine(line) {
      const out = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cur += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            out.push(cur);
            cur = '';
          } else {
            cur += ch;
          }
        }
      }
      out.push(cur);
      return out;
    }

    async function loadCsv(path) {
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`Failed to load ${path}: ${resp.status}`);
      const text = await resp.text();
      const lines = text.trim().split(/\r?\n/);
      const headers = parseCsvLine(lines[0]);
      return lines.slice(1).map((line) => {
        const cols = parseCsvLine(line);
        const obj = {};
        headers.forEach((h, idx) => obj[h] = cols[idx]);
        return {
          season: +obj.season,
          event_code: obj.event_code,
          event_name: obj.event_name,
          team_count: +obj.team_count,
          match_count: +obj.match_count,
          team_number: +obj.team_number,
          adv_rank: obj.adv_rank === '' ? null : +obj.adv_rank,
          qual_rank: obj.qual_rank === '' ? null : +obj.qual_rank,
          qual_points: obj.qual_points === '' ? null : +obj.qual_points,
          alliance_selection_points: obj.alliance_selection_points === '' ? null : +obj.alliance_selection_points,
          award_points: obj.award_points === '' ? null : +obj.award_points,
          playoff_points: obj.playoff_points === '' ? null : +obj.playoff_points,
          total_points: obj.total_points === '' ? null : +obj.total_points,
          advanced: obj.advanced === 'true',
          is_advancement_eligible: obj.is_advancement_eligible === 'true',
        };
      });
    }

    const applyRangePreset = () => {
      const val = rangeSelect.value;
      const isCustom = val === 'custom';

      const minLabel = document.getElementById('minTeamsLabel');
      const maxLabel = document.getElementById('maxTeamsLabel');

      if (minLabel) minLabel.style.display = isCustom ? 'flex' : 'none';
      if (maxLabel) maxLabel.style.display = isCustom ? 'flex' : 'none';

      if (isCustom) {
        minInput.disabled = false;
        maxInput.disabled = false;
        return;
      }
      const preset = RANGE_PRESETS[val];
      if (!preset) return;
      minInput.value = preset.min;
      maxInput.value = preset.max;
      minInput.disabled = true;
      maxInput.disabled = true;
    };

    function isAdvancing(row, threshold) {
      if (row.adv_rank == null || Number.isNaN(row.adv_rank)) return false;
      return row.adv_rank <= threshold;
    }

    function renderTableToggles() {
      if (!tableToggles) return;
      tableToggles.innerHTML = '';
      FACTORS.forEach((f) => {
        const label = document.createElement('label');
        const box = document.createElement('input');
        box.type = 'checkbox';
        box.value = f.id;
        box.checked = true;
        label.appendChild(box);
        label.appendChild(document.createTextNode(f.label));
        tableToggles.appendChild(label);
      });
      selectedTables = getSelectedTableKeys();
    }

    function renderFactorTables(rows, threshold) {
      const isLowData = rows.length <= 100;
      const parts = [];

      for (const factor of FACTORS) {
        if (!selectedTables.has(factor.id)) continue;
        const groups = new Map();
        for (const r of rows) {
          const meta = factor.normalize(factor.get(r));
          if (!meta) continue;
          const key = meta.key;
          if (!groups.has(key)) groups.set(key, { ...meta, total: 0, hits: 0 });
          const g = groups.get(key);
          g.total += 1;
          if (isAdvancing(r, threshold)) g.hits += 1;
        }

        let sorted = Array.from(groups.values());
        if (!isLowData) {
          sorted = sorted.filter((g) => g.total > 2);
        }
        sorted.sort((a, b) => a.sort - b.sort);

        if (!sorted.length) {
          parts.push(`<table><caption>${factor.fullLabel || factor.label}</caption><tr><td class="missing">No data${!isLowData ? ' (n>2)' : ''}</td></tr></table>`);
          continue;
        }
        const rowsHtml = [];
        rowsHtml.push('<table class="factor-table">');
        rowsHtml.push(`<caption>${factor.fullLabel || factor.label}</caption>`);
        rowsHtml.push('<tr><th>Value</th><th>Advance chance</th><th>Teams</th></tr>');
        for (const g of sorted) {
          const pct = (g.hits / g.total) * 100;
          const { bg, fg } = colorForPct(pct);
          rowsHtml.push(`<tr><th>${g.label}</th><td style="background:${bg};color:${fg};">${pct.toFixed(1)}%</td><td>${g.total}</td></tr>`);
        }
        rowsHtml.push('</table>');
        parts.push(rowsHtml.join(''));
      }
      if (!parts.length) {
        factorTables.innerHTML = '<p style="color:red;">No tables selected to display.</p>';
      } else {
        factorTables.innerHTML = parts.join('');
      }
    }

    function renderGrid(rows, threshold, xId, yId) {
      const isLowData = rows.length <= 100;
      const xFactor = FACTOR_LOOKUP[xId];
      const yFactor = FACTOR_LOOKUP[yId];
      if (!xFactor || !yFactor || xFactor.id === yFactor.id) {
        tableContainer.innerHTML = '<p style="color:red;">Choose two different factors for rows/columns.</p>';
        return;
      }

      const xVals = new Map();
      const yVals = new Map();
      const combos = new Map();

      for (const r of rows) {
        const xMeta = xFactor.normalize(xFactor.get(r));
        const yMeta = yFactor.normalize(yFactor.get(r));
        if (!xMeta || !yMeta) continue;
        const key = `${xMeta.key}|||${yMeta.key}`;

        if (!xVals.has(xMeta.key)) xVals.set(xMeta.key, { ...xMeta, count: 0 });
        xVals.get(xMeta.key).count++;

        if (!yVals.has(yMeta.key)) yVals.set(yMeta.key, { ...yMeta, count: 0 });
        yVals.get(yMeta.key).count++;

        if (!combos.has(key)) combos.set(key, { total: 0, hits: 0 });
        const c = combos.get(key);
        c.total += 1;
        if (isAdvancing(r, threshold)) c.hits += 1;
      }

      let xList = Array.from(xVals.values());
      let yList = Array.from(yVals.values());

      if (!isLowData) {
        xList = xList.filter((x) => x.count > 2);
        yList = yList.filter((y) => y.count > 2);
      }

      xList.sort((a, b) => a.sort - b.sort);
      yList.sort((a, b) => a.sort - b.sort);

      if (!xList.length || !yList.length) {
        tableContainer.innerHTML = '<p>No data for this factor pair.</p>';
        return;
      }

      const out = [];
      const captionText = `${yFactor.fullLabel || yFactor.label} \\ ${xFactor.fullLabel || xFactor.label} (adv rank ≤ ${threshold})`;

      out.push('<table class="grid-table">');
      out.push('<thead>');
      out.push('<tr><th></th>' + xList.map((x) => `<th>${x.label}</th>`).join('') + '</tr>');
      out.push('</thead>');
      out.push('<tbody>');
      for (const y of yList) {
        out.push(`<tr><th>${y.label}</th>`);
        for (const x of xList) {
          const key = `${x.key}|||${y.key}`;
          const cell = combos.get(key);
          if (!cell) {
            out.push('<td class="missing">–</td>');
          } else {
            const pct = (cell.hits / cell.total) * 100;
            const { bg, fg } = colorForPct(pct);
            out.push(`<td style="background:${bg};color:${fg};">${pct.toFixed(1)}%<br><small>(n=${cell.total})</small></td>`);
          }
        }
        out.push('</tr>');
      }
      out.push('</tbody>');
      out.push('</table>');

      tableContainer.innerHTML = `<div class="grid-caption">${captionText}</div><div class="grid-scroll">${out.join('')}</div>`;
    }

    function render() {
      const minTeams = Math.max(0, parseInt(minInput.value, 10) || 0);
      const maxTeams = Math.max(minTeams, parseInt(maxInput.value, 10) || minTeams);
      const threshold = Math.max(1, parseInt(thresholdInput.value, 10) || 1);
      const axisX = axisXSelect.value || 'playoff';
      const axisY = axisYSelect.value || 'award';

      const filtered = DATA.filter((r) => r.team_count >= minTeams && r.team_count <= maxTeams && r.adv_rank != null);
      const eventCount = new Set(filtered.map((r) => `${r.season}-${r.event_code}`)).size;

      const warningEl = document.getElementById('warning-container');
      if (warningEl) {
        warningEl.innerHTML = filtered.length <= 100
          ? '<p style="color:orange; font-weight:bold; margin: 10px 0;">Warning: Low data, percentages could be inaccurate</p>'
          : '';
      }

      renderFactorTables(filtered, threshold);
      renderGrid(filtered, threshold, axisX, axisY);

      statusEl.innerHTML = `Filtered to ${filtered.length} team rows across ${eventCount} events | Team range: ${minTeams}-${maxTeams} | Adv rank success ≤ ${threshold} | <strong>Percentages are based on historical events.</strong>`;
    }

    controls.addEventListener('submit', (e) => {
      e.preventDefault();
      render();
      trackEvent('apply_filters', {
        min_teams: minInput.value,
        max_teams: maxInput.value,
        threshold: thresholdInput.value
      });
    });

    rangeSelect.addEventListener('change', () => {
      applyRangePreset();
      render();
      trackEvent('select_team_range', { range_value: rangeSelect.value });
    });
    axisXSelect.addEventListener('change', () => {
      render();
      trackEvent('change_axis_x', { factor_id: axisXSelect.value });
    });
    axisYSelect.addEventListener('change', () => {
      render();
      trackEvent('change_axis_y', { factor_id: axisYSelect.value });
    });
    tableToggles.addEventListener('change', (e) => {
      selectedTables = getSelectedTableKeys();
      render();
      if (e.target && e.target.type === 'checkbox') {
        trackEvent('toggle_factor_table', {
          factor_id: e.target.value,
          visible: e.target.checked
        });
      }
    });

    // GA Tracking Helper
    function trackEvent(eventName, params) {
      if (typeof gtag === 'function') {
        gtag('event', eventName, params);
      }
    }

    applyRangePreset();

    for (const sel of [axisXSelect, axisYSelect]) {
      FACTORS.forEach((f) => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = f.label;
        sel.appendChild(opt);
      });
    }
    axisXSelect.value = 'playoff';
    axisYSelect.value = 'award';
    renderTableToggles();

    loadCsv('advancementData.csv')
      .then((rows) => { DATA = rows; render(); })
      .catch((err) => { tableContainer.innerHTML = `<p style="color:red;">${err.message}</p>`; });
  </script>
</body>

</html>
