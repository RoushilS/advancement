name: Refresh advancement data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest advancement data
        env:
          API_ORIGIN: https://www.api.ftcscout.j5155.page/graphql
          FRONTEND_CODE: ftc-scout
        run: |
          set -euo pipefail
          node advancementDataFromCsv.mjs 2025 advancementData.csv

      - name: Commit and push if data changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add advancementData.csv
            git commit -m "chore: refresh advancement data"
            git push
          else
            echo "No changes to commit"
          fi
